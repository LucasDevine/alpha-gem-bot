name: Alpha Gem Scanner
on:
  schedule:
      - cron: '0 6 * * 1-5'
          - cron: '0 14 * * 1-5'
            workflow_dispatch:
            jobs:
              scan:
                  runs-on: ubuntu-latest
                      timeout-minutes: 15
                          steps:
                                - uses: actions/checkout@v4
                                      - uses: actions/setup-python@v5
                                              with:
                                                        python-version: '3.11'
                                                              - name: Install
                                                                      run: pip install requests schedule
                                                                            - name: Run
                                                                                    run: timeout 600 python bot.py || true
